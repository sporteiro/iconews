<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcoNews - news at a glance</title>
    <link rel="stylesheet" href="/estilo.css">
    <link rel="stylesheet" href="/dd.css">
    <script src="/jquery.js"></script>
</head>
<body>
    <div id="cabecera">
        <div class="brand">
            <img src="/img/logo_white.png" alt="IcoNews logo" id="logo" style="max-width: 200px; width: 100%; height: auto; display: block;">
            <p class="tagline">news at a glance</p>
        </div>
        <div class="country-selector">
            <label for="select_country">País:</label>
            <select id="select_country"></select>
        </div>
    </div>

    <div id="titulares">
        <p>Cargando noticias...</p>
    </div>

    <footer>
        <p>
            IcoNews is made by <a href="https://sebastianporteiro.com" target="_blank" rel="noopener noreferrer">Sebastian Porteiro</a>.
            <span id="current-year"></span>
        </p>
    </footer>

    <script src="/main.js"></script>
    <script>
        document.getElementById('current-year').textContent = ' — ' + new Date().getFullYear();
    </script>
</body>
</html>
